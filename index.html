<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>KOKUEN ROULETTE</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { 
            text-align: center; 
            font-family: 'Inter', 'Pretendard', sans-serif; 
            background: #050505; 
            color: #ffffff; 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        h1 { 
            font-size: 40px; 
            letter-spacing: 5px; 
            color: #3F51B5; /* Indigo */
            text-shadow: 0 0 20px rgba(63, 81, 181, 0.5);
            margin-bottom: 40px;
        }

        .input-group { margin-bottom: 30px; }
        input { 
            padding: 15px; 
            margin: 0 5px; 
            border: 1px solid #3F51B5; 
            border-radius: 4px; 
            width: 220px; 
            font-size: 15px; 
            background: #000; 
            color: #fff;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: #5C6BC0; box-shadow: 0 0 10px rgba(63, 81, 181, 0.3); }

        .roulette-container { position: relative; }
        .pointer { 
            position: absolute; top: -30px; left: 50%; transform: translateX(-50%); 
            width: 0; height: 0; 
            border-left: 15px solid transparent; 
            border-right: 15px solid transparent; 
            border-top: 35px solid #ffffff; 
            z-index: 10;
        }
        canvas { 
            border-radius: 50%; 
            border: 5px solid #1A237E; /* Dark Indigo */
            box-shadow: 0 0 50px rgba(0, 0, 0, 1);
        }

        #spin-btn { 
            margin-top: 50px;
            padding: 20px 80px; 
            font-size: 18px; 
            letter-spacing: 3px;
            cursor: pointer; 
            background: #3F51B5; 
            color: #fff; 
            border: none; 
            border-radius: 2px; 
            font-weight: bold;
            transition: 0.4s;
        }
        #spin-btn:hover { background: #5C6BC0; box-shadow: 0 0 20px rgba(63, 81, 181, 0.6); }
        #spin-btn:disabled { background: #1a1a1a; color: #444; cursor: not-allowed; box-shadow: none; }
    </style>
</head>
<body>

    <h1>KOKUEN</h1>
    
    <div class="input-group">
        <input type="text" id="userName" placeholder="NAME">
        <input type="number" id="userPoint" placeholder="POINT">
    </div>

    <div class="roulette-container">
        <div class="pointer"></div>
        <canvas id="rouletteCanvas" width="480" height="480"></canvas>
    </div>

    <button id="spin-btn" onclick="startSpin()">START</button>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBSGi4xOk1Con147K0q5M6Y2PH6oK0m0Sk",
            authDomain: "project-4611054851543853758.firebaseapp.com",
            databaseURL: "https://project-4611054851543853758-default-rtdb.firebaseio.com",
            projectId: "project-4611054851543853758"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const canvas = document.getElementById('rouletteCanvas');
        const ctx = canvas.getContext('2d');
        const items = ["x0", "-100", "+25", "x5", "x100"];
        
        // 인디고 톤의 컬러 팔레트
        const colors = ["#0D47A1", "#1A237E", "#283593", "#303F9F", "#3F51B5"];
        let currentAngle = 0;
        let isSpinning = false;

        function draw() {
            const num = items.length;
            const arc = (Math.PI * 2) / num;
            ctx.clearRect(0, 0, 480, 480);

            items.forEach((item, i) => {
                const angle = currentAngle + (i * arc);
                ctx.beginPath();
                ctx.fillStyle = colors[i];
                ctx.moveTo(240, 240);
                ctx.arc(240, 240, 235, angle, angle + arc);
                ctx.fill();
                ctx.strokeStyle = "rgba(255,255,255,0.1)";
                ctx.stroke();

                ctx.save();
                ctx.translate(240, 240);
                ctx.rotate(angle + arc / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "#fff";
                ctx.font = "200 24px 'Inter'";
                ctx.fillText(item, 210, 8);
                ctx.restore();
            });
        }
function startSpin() {
    if (isSpinning) return;
    const name = document.getElementById('userName').value;
    const pointInput = document.getElementById('userPoint').value;

    if(!name || !pointInput) return;

    const currentPoint = parseInt(pointInput);
    isSpinning = true;
    document.getElementById('spin-btn').disabled = true;

    // [최종 확률 로직] 0~100 사이의 난수 발생
    const rand = Math.random() * 100;
    let resultLabel = "";
    let finalValue = 0;
    let itemIndex = 0; 

    if (rand < 10) { 
        // 0 ~ 9.9 (10% 확률) - x0 대폭 축소
        resultLabel = "x0"; finalValue = 0; itemIndex = 0; 
    } else if (rand < 25) { 
        // 10 ~ 24.9 (15% 확률) - -100
        resultLabel = "-100"; finalValue = currentPoint - 100; itemIndex = 1; 
    } else if (rand < 75) { 
        // 25 ~ 74.9 (50% 확률) - +25 대폭 확대
        resultLabel = "+25"; finalValue = currentPoint + 25; itemIndex = 2; 
    } else if (rand < 95) { 
        // 75 ~ 94.9 (20% 확률) - x5
        resultLabel = "x5"; finalValue = currentPoint * 5; itemIndex = 3; 
    } else { 
        // 95 ~ 100 (5% 확률) - x100
        resultLabel = "x100"; finalValue = currentPoint * 100; itemIndex = 4; 
    }

    // 애니메이션 및 결과 저장 로직
    const num = items.length;
    const arc = (Math.PI * 2) / num;
    const targetAngle = (Math.PI * 1.5) - (itemIndex * arc) - (arc / 2);
    const totalRotation = (Math.PI * 2 * 15) + (targetAngle - (currentAngle % (Math.PI * 2)));
    
    let startTime = null;
    const duration = 7000; 
    const startAngle = currentAngle;

    function animate(timestamp) {
        if (!startTime) startTime = timestamp;
        const elapsed = timestamp - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const easeOut = 1 - Math.pow(1 - progress, 5); 
        currentAngle = startAngle + (totalRotation * easeOut);
        draw();

        if (progress < 1) {
            requestAnimationFrame(animate);
        } else {
            isSpinning = false;
            document.getElementById('spin-btn').disabled = false;

            database.ref('roulette_results/').push({
                user_name: name,
                input_point: currentPoint,
                win_label: resultLabel,
                final_point: finalValue,
                timestamp: new Date().toLocaleString()
            });

            alert(`RESULT: ${resultLabel}\nFINAL POINT: ${finalValue.toLocaleString()}`);
        }
    }
    requestAnimationFrame(animate);
}

        draw();
    </script>
</body>
</html>
